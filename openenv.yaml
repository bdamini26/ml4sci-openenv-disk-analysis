spec_version: "1.0"
name: "disk-image-analysis"
title: "Protoplanetary Disk Image Analysis"
description: "OpenEnv environment for analyzing protoplanetary disk images using machine learning"
version: "1.0.0"

environment:
  reset:
    description: "Reset the environment and return initial observation"
    method: "POST"
    path: "/reset"
    request_body: {}
    response:
      status_code: 200
      content:
        observation:
          disk_image: "list of lists (32x32)"
          task_id: "int"
          step_count: "int"
          last_action_feedback: "string or null"

  step:
    description: "Execute one step in the environment"
    method: "POST"
    path: "/step"
    request_body:
      analysis_type: "string"
      confidence: "float (0.0-1.0)"
      prediction: "string"
      reasoning: "string"
    response:
      status_code: 200
      content:
        observation:
          disk_image: "list of lists (32x32)"
          task_id: "int"
          step_count: "int"
          last_action_feedback: "string"
        reward:
          task_reward: "float (0.0-1.0)"
          accuracy_bonus: "float"
          confidence_penalty: "float"
          total_reward: "float (0.0-1.0)"
          reward_summary: "string"
        done: "boolean"
        info: "object"

  state:
    description: "Get current environment state"
    method: "POST"
    path: "/state"
    request_body: {}
    response:
      status_code: 200
      content:
        state:
          task_id: "int"
          step_count: "int"
          done: "boolean"
          ground_truth: "object"
          current_image_shape: "list"
          history: "list"

observation:
  type: "object"
  properties:
    disk_image:
      type: "array"
      description: "32x32 normalized grayscale disk image"
    task_id:
      type: "integer"
      description: "Current task ID (1-3)"
    step_count:
      type: "integer"
      description: "Number of steps taken"
    last_action_feedback:
      type: ["string", "null"]
      description: "Feedback from previous action"

action:
  type: "object"
  properties:
    analysis_type:
      type: "string"
      description: "Type of analysis (detect_transit, classify_disk, estimate_properties)"
    confidence:
      type: "number"
      minimum: 0.0
      maximum: 1.0
      description: "Agent's confidence (0.0-1.0)"
    prediction:
      type: "string"
      description: "The prediction/answer"
    reasoning:
      type: "string"
      description: "Reasoning for prediction"

reward:
  type: "object"
  properties:
    task_reward:
      type: "number"
      description: "Reward for task performance"
    accuracy_bonus:
      type: "number"
      description: "Bonus for accuracy"
    confidence_penalty:
      type: "number"
      description: "Penalty for overconfidence"
    total_reward:
      type: "number"
      description: "Total reward (0.0-1.0)"
    reward_summary:
      type: "string"
      description: "Human readable reward summary"

tasks:
  - id: 1
    name: "Transit Detection"
    difficulty: "easy"
    description: "Binary classification: detect if a planet transit occurred"
    type: "classification"
    
  - id: 2
    name: "Disk Classification"
    difficulty: "medium"
    description: "3-class classification: young_disk, evolved_disk, debris_disk"
    type: "classification"
    
  - id: 3
    name: "Property Estimation"
    difficulty: "hard"
    description: "Regression: estimate disk properties (mass, inclination, scale height)"
    type: "regression"

deployment:
  port: 7860
  host: "0.0.0.0"
  framework: "fastapi"
  
metadata:
  domain: "astronomy"
  subdomain: "protoplanetary-disk-analysis"
  research_project: "ML4SCI EXXA"
  keywords:
    - "machine-learning"
    - "reinforcement-learning"
    - "astronomy"
    - "disk-analysis"
    - "multi-task-learning"